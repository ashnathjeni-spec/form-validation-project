<!DOCTYPE html>
<html>
<head>
<title>Form Validation</title>

<link rel="stylesheet" href="style.css">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center">Registration Form</h2>

<form onsubmit="return validateForm()">

<div class="mb-3">
<label>Full Name</label>
<input type="text" id="name" class="form-control" onchange="checkName()">
<span id="nameError" class="error"></span>
</div>

<div class="mb-3">
<label>Email</label>
<input type="text" id="email" class="form-control" onchange="checkEmail()">
<span id="emailError" class="error"></span>
</div>

<div class="mb-3">
<label>Phone Number</label>
<input type="text" id="phone" class="form-control" onchange="checkPhone()">
<span id="phoneError" class="error"></span>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" id="password" class="form-control" onchange="checkPassword()">
<span id="passwordError" class="error"></span>
</div>

<div class="mb-3">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" class="form-control" onchange="checkConfirmPassword()">
<span id="confirmError" class="error"></span>
</div>

<button class="btn btn-primary">Submit</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
